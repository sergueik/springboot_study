# Integration test configuration with real YouTube API credentials
spring.application.name=dvaas-integration-test

# Anthropic API - dummy value for integration tests
spring.ai.anthropic.api-key=test-key

# MCP Server Configuration for integration tests
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=dvaas-mcp-server-integration
spring.ai.mcp.server.version=0.0.1-integration
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.protocol=streamable

# YouTube Configuration - REAL credentials for integration testing
# Set these environment variables before running integration tests:
# export YOUTUBE_API_KEY="your_actual_api_key"
# export YOUTUBE_CHANNEL_ID="your_actual_channel_id"
dvaas.youtube.api-key=${YOUTUBE_API_KEY:test-youtube-api-key-1234567890}
dvaas.youtube.channel-id=${YOUTUBE_CHANNEL_ID:UC1234567890123456789012}

# Blog Configuration - dummy values for integration tests
dvaas.blog.rss-url=https://www.danvega.dev/rss.xml
dvaas.blog.cache-duration=PT30M

# Speaking Configuration - dummy values for integration tests
dvaas.speaking.api-url=https://www.danvega.dev/api/speaking
dvaas.speaking.cache-duration=PT30M

# Newsletter Configuration - dummy values for integration tests
dvaas.newsletter.api-key=test-newsletter-api-key
dvaas.newsletter.base-url=https://api.beehiiv.com/v2
dvaas.newsletter.cache-duration=PT30M
dvaas.newsletter.publications.danvega=pub_test_danvega_123
dvaas.newsletter.publications.bytesizedai=pub_test_bytesizedai_456

# Podcast Configuration - dummy values for integration tests
dvaas.podcast.api-key=test-podcast-api-key-1234567890
dvaas.podcast.application-name=dvaas-podcast-mcp-test
dvaas.podcast.cache-duration=PT30M
dvaas.podcast.spring-office-hours-show-id=41020
dvaas.podcast.fundamentals-show-id=69333

# Enable debug logging for YouTube integration
logging.level.dev.danvega.dvaas.tools.youtube=DEBUG