schemaTests:
  validCases:
    - name: valid-basic-account
      payloadResource: schema/valid/account.json

  invalidCases:
    - name: missing-customer-name
      expectedMessage: "name"
      payloadResource: schema/invalid/missing-customer-name.json

    - name: invalid-account-type
      expectedMessage: "anyOf"
      payloadResource: schema/invalid/invalid-account-type.json

app:
  # NOTE: Jackson will happily carry "$ref", "anyOf", "allOf" as JSON data
  # but it will *NOT* understand or resolve any of it as a schema engine.
  components:
    customer: classpath:components/customer.json
    account: classpath:components/account.json
    transaction: classpath:components/transaction.json

  assembly:
    root: transaction
    includes:
      - customer
      - account

