# -----------------------------------
# Section 1: test-specific properties
# -----------------------------------

example.baseBadPath=src/test/resources/copybooks/bad/
example.baseGoodPath=src/test/resources/copybooks/good/
example.badCopybooks=bad-88-placement.cbl,example-dc3aa31c.cbl,garbage-token.cbl,comp3-fields.cbl,occurs-array.cbl,simple-fixed.cbl,with-88-levels.cbl,missing-level.cbl
example.goodCopybooks=example.cbl



# ================================================
# Metric extractors (map) - not used in the code
# ================================================
example.metricExtractors.load_average=\\s*(?:\\S+)\\s\\s*(?:\\S+)\\s\\s*(?:\\S+)\\s\\s*(?:\\S+)\\s\\s*(\\S+)\\s*
example.metricExtractors.rpm=\\b(\\d+)\\b
example.metricExtractors.rpm_custom_name=\\b(\\d+)\\b

# ---------------------------------------
# Section 2: shadowed main app properties
# ---------------------------------------
# WARNING: need to shadow src/main/resource - Spring *loads* *everything*
app.copybookPath=${user.dir}/src/main/resources/example.cbl
app.dataPath=${user.dir}/src/main/resources/example.bin
app.font=cp037
app.chunkSize=10000
