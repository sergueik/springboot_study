server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }
  # proxy rules for backend api endpoints
  location /api {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;

    proxy_request_buffering off;
    proxy_buffering off;
  }
  # deny access to .env
  location ~/\. {
    deny all;
  }
  client_max_body_size 100m;
}
