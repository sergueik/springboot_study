version: '3.5'

services:
  mysql-server:
    container_name: mysql-server
    hostname: mysql-server
    image: mysql:5.7
    environment:
      - 'MYSQL_ROOT_PASSWORD=nimda'
      - 'MYSQL_USER=example_db_user'
      - 'MYSQL_DATABASE=example_db'
      - 'MYSQL_PASSWORD=example_db_pass'
    ports:
      - "3306:3306"
    volumes:
      # - ./db:/docker-entrypoint-initdb.d
      - ./app/src/main/resources/metadata:/docker-entrypoint-initdb.d
    networks:
      - example
  delayed_start:
    container_name: delayed_start
    build:
      context: delayed_start
      dockerfile: Dockerfile
    image: alpine:3.9
    depends_on:
      - mysql-server
    environment:
      SERVICE_PORT: 3306
      SERVICE_HOST: mysql-server
    networks:
      - example
  app:
    build: ./app
    depends_on:
      - delayed_start
      - mysql-server
    networks:
      - example
    environment:
      # NOTE: surrrenty unused
      - 'JDBC_URL=jdbc:mysql://mysql-server:3306/example_db?connectTimeout=0&amp;socketTimeout=0&amp;autoReconnect=true'
      - 'JDBC_USER=example_db_user'
      - 'JDBC_PASS=example_db_pass'
    ports:
      - "8080:8080"
    links:
      - mysql-server
networks:
  example:
