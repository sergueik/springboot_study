name: CI
on: push

jobs:
  test:
    runs-on: ubuntu-18.04
    container:
      # note: need node - eclipse-temurin-alpine will not work
      # image: eclipse-temurin:11-jdk-alpine
      image: atools/jdk-maven-node:mvn3-jdk11-node16
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 11 for x64
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          architecture: x64
          cache: maven
      - name: Build with Maven test phase
        run: |
          mvn -q dependency:go-offline
          mvn -B test
          mvn -B -DskipTests package

