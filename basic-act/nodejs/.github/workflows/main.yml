name: CI
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      # image: node:18-alpine
      image: alpine:3.21 
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 18
    - run: npm install
    - run: npm test
